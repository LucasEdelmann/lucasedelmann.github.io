<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CutStats – My Video Editing Stats</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface2: #18181c;
    --border: #222228;
    --accent: #e8ff3c;
    --accent2: #ff8c42;
    --text: #f0f0f2;
    --muted: #6b6b78;
    --green: #2dce71;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 80% 10%, rgba(232,255,60,0.04) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 10% 80%, rgba(255,140,66,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header { padding: 36px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }

  .header-inner {
    display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 16px;
  }

  .logo { display: flex; align-items: center; gap: 14px; }

  .logo-icon {
    width: 46px; height: 46px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-icon svg { width: 26px; height: 26px; }

  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px; letter-spacing: 3px; line-height: 1; color: var(--text);
  }

  .logo-text p {
    font-size: 11px; color: var(--muted);
    letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px;
  }

  .last-update { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }

  .live-dot {
    width: 7px; height: 7px; background: var(--green);
    border-radius: 50%; animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.75); }
  }

  /* ── STATES ── */
  .state-box { text-align: center; padding: 80px 24px; color: var(--muted); }
  .state-box .icon { font-size: 48px; margin-bottom: 16px; display: block; }
  .state-box p { font-size: 14px; line-height: 1.8; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── KPI GRID ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin-bottom: 40px;
  }

  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 22px 20px;
    position: relative; overflow: hidden;
    animation: fadeUp 0.5s ease both; transition: border-color 0.25s;
  }

  .stat-card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity 0.25s;
  }

  .stat-card:hover { border-color: #2e2e38; }
  .stat-card:hover::after { opacity: 1; }

  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 1px; line-height: 1; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }

  /* ── LINE CHART ── */
  .chart-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px 24px 20px;
    margin-bottom: 40px; animation: fadeUp 0.5s ease 0.15s both; overflow: visible;
  }

  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .chart-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--muted); }
  .chart-total { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); letter-spacing: 1px; }

  .chart-wrap { position: relative; width: 100%; height: 140px; overflow: visible; }
  svg.line-chart { width: 100%; height: 100%; overflow: visible; }
  .chart-label { font-size: 10px; fill: var(--muted); font-family: 'DM Sans', sans-serif; }

  /* Tooltip */
  .chart-tooltip {
    position: absolute;
    background: #1a1a20;
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 12px;
    color: var(--text);
    pointer-events: none;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
    transform: translate(-50%, -110%);
  }

  .chart-tooltip.visible { opacity: 1; }
  .chart-tooltip strong { color: var(--accent); font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 0.5px; }

  /* hover dots – larger hit area */
  .dot-hit {
    cursor: crosshair;
    fill: transparent;
  }

  .dot-hit:hover + .dot-vis,
  .dot-vis.active {
    r: 5;
  }

  /* ── CHANNELS ── */
  .channels-section { margin-bottom: 40px; animation: fadeUp 0.5s ease 0.2s both; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }

  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; }

  .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }

  .channel-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 18px;
    display: flex; align-items: center; gap: 14px; transition: border-color 0.2s;
  }

  .channel-card:hover { border-color: #2e2e38; }
  .channel-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .channel-info { flex: 1; min-width: 0; }
  .channel-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .channel-meta { font-size: 11px; color: var(--muted); }
  .channel-views { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--text); white-space: nowrap; }

  /* ── SORT BAR ── */
  .sort-bar { display: flex; gap: 8px; flex-wrap: wrap; }

  .sort-btn {
    font-size: 11px; font-family: 'DM Sans', sans-serif;
    color: var(--muted); background: var(--surface2);
    border: 1px solid var(--border); padding: 5px 14px;
    border-radius: 20px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }

  .sort-btn:hover { color: var(--text); border-color: #444; }
  .sort-btn.active { color: var(--bg); background: var(--accent); border-color: var(--accent); font-weight: 600; }

  /* ── VIDEO LIST ── */
  .video-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }

  .video-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 13px; padding: 14px 18px;
    display: grid; grid-template-columns: 36px 88px 1fr auto;
    align-items: center; gap: 14px;
    transition: all 0.2s; animation: fadeUp 0.4s ease both;
    text-decoration: none; color: inherit;
  }

  .video-card:hover { border-color: #2e2e38; background: var(--surface2); transform: translateX(3px); }

  .video-rank { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--border); text-align: center; line-height: 1; }
  .video-rank.top { color: var(--accent); }

  .video-thumb { width: 88px; height: 50px; border-radius: 7px; background: var(--surface2); overflow: hidden; flex-shrink: 0; }
  .video-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg,#1a1a20,#222230); display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--muted); }

  .video-info { min-width: 0; }

  .video-info h3 {
    font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 5px;
    word-break: break-word; overflow-wrap: break-word;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  .video-meta { display: flex; gap: 10px; font-size: 11px; color: var(--muted); flex-wrap: wrap; }
  .channel-pill { display: inline-flex; align-items: center; gap: 5px; }
  .channel-pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .video-views { text-align: right; flex-shrink: 0; }
  .views-number { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.5px; line-height: 1; color: var(--text); }
  .views-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* ── SHOW MORE ── */
  .show-more-wrap { text-align: center; margin-bottom: 48px; }

  .show-more-btn {
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--muted); background: var(--surface); border: 1px solid var(--border);
    padding: 10px 28px; border-radius: 24px; cursor: pointer; transition: all 0.2s;
  }

  .show-more-btn:hover { color: var(--text); border-color: #444; }

  footer { border-top: 1px solid var(--border); padding: 22px 0; text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 0.5px; margin-top: 24px; }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    .video-card { grid-template-columns: 28px 1fr auto; gap: 10px; padding: 12px 14px; }
    .video-thumb { display: none; }
    .stat-value { font-size: 30px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .chart-wrap { height: 110px; }
    .video-info h3 { font-size: 12px; -webkit-line-clamp: 3; }
    .sort-btn { font-size: 10px; padding: 4px 10px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6" cy="6" r="3"/>
            <circle cx="6" cy="18" r="3"/>
            <line x1="20" y1="4" x2="8.12" y2="15.88"/>
            <line x1="14.47" y1="14.48" x2="20" y2="20"/>
            <line x1="8.12" y1="8.12" x2="12" y2="12"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1>CUTSTATS</h1>
          <p>Video Editor Dashboard</p>
        </div>
      </div>
      <div class="last-update">
        <div class="live-dot"></div>
        Updated: <span id="updateTime">–</span>
      </div>
    </div>
  </header>

  <div id="app">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Loading data…</p>
    </div>
  </div>

  <footer>
    CUTSTATS &nbsp;·&nbsp; YouTube Data API v3 &nbsp;·&nbsp; Automatically updated every day
  </footer>
</div>

<script>
  // ── CONFIG ───────────────────────────────────────────────────────────────
  const DATA_URL = 'https://raw.githubusercontent.com/LucasEdelmann/lucasedelmann.github.io/main/data.json';
  // ─────────────────────────────────────────────────────────────────────────

  const PALETTE = ['#e8ff3c','#ff8c42','#2dce71','#4db8ff','#c77dff','#ff6b9d','#ffd166','#06d6a0'];

  let globalData = null;
  let currentSort = 'views';
  let showAll = false;
  const PAGE_SIZE = 5;

  function fmt(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return Math.round(n / 1e3) + 'K';
    return n.toLocaleString('en-US');
  }

  function fmtFull(n) { return n.toLocaleString('en-US'); }

  function fmtDate(iso) {
    if (!iso) return '–';
    return new Date(iso).toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function buildChannelMap(videos) {
    const channels = [...new Set(videos.map(v => v.channel))];
    const map = {};
    channels.forEach((ch, i) => { map[ch] = PALETTE[i % PALETTE.length]; });
    return map;
  }

  // ── KPIs ──
  function renderKPIs(data, channelMap) {
    const channelCount = Object.keys(channelMap).length;
    return `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Views</div>
        <div class="stat-value">${fmt(data.total_views)}</div>
        <div class="stat-sub">${fmtFull(data.total_views)} total clicks</div>
      </div>
      <div class="stat-card" style="animation-delay:.05s">
        <div class="stat-label">Videos Edited</div>
        <div class="stat-value">${data.video_count}</div>
        <div class="stat-sub">across ${channelCount} channel${channelCount !== 1 ? 's' : ''}</div>
      </div>
      <div class="stat-card" style="animation-delay:.1s">
        <div class="stat-label">Avg. per Video</div>
        <div class="stat-value">${fmt(Math.round(data.total_views / data.video_count))}</div>
        <div class="stat-sub">views on average</div>
      </div>
      <div class="stat-card" style="animation-delay:.15s">
        <div class="stat-label">Total Likes</div>
        <div class="stat-value">${fmt(data.total_likes)}</div>
        <div class="stat-sub">across all videos</div>
      </div>
      <div class="stat-card" style="animation-delay:.2s">
        <div class="stat-label">Channels</div>
        <div class="stat-value">${channelCount}</div>
        <div class="stat-sub">different channels</div>
      </div>
    </div>`;
  }

  // ── CHART with hover tooltips ──
  function renderChart(videos, totalViews) {
    const sorted = [...videos].sort((a, b) => new Date(a.published) - new Date(b.published));
    let cum = 0;
    const points = sorted.map(v => ({
      label: v.published ? v.published.slice(0, 7) : '',
      title: v.title,
      val: (cum += v.views)
    }));
    if (points.length < 2) return '';

    const W = 900, H = 120, P = { t: 10, r: 10, b: 28, l: 10 };
    const iW = W - P.l - P.r, iH = H - P.t - P.b;
    const maxVal = points[points.length - 1].val;
    const px = i => P.l + (i / (points.length - 1)) * iW;
    const py = v => P.t + iH - (v / maxVal) * iH;

    const pathD = points.map((p, i) => `${i===0?'M':'L'}${px(i).toFixed(1)},${py(p.val).toFixed(1)}`).join(' ');
    const areaD = `${pathD} L${px(points.length-1).toFixed(1)},${(P.t+iH).toFixed(1)} L${P.l},${(P.t+iH).toFixed(1)} Z`;

    const step = Math.max(1, Math.floor(points.length / 6));
    const labels = points
      .map((p, i) => ({ ...p, i }))
      .filter((_, i) => i === 0 || i === points.length - 1 || i % step === 0)
      .map(p => `<text x="${px(p.i).toFixed(1)}" y="${H-4}" text-anchor="middle" class="chart-label">${p.label}</text>`)
      .join('');

    // Interactive dots with data attributes for JS tooltip
    const dots = points.map((p, i) => `
      <circle
        cx="${px(i).toFixed(1)}" cy="${py(p.val).toFixed(1)}" r="10"
        fill="transparent" class="dot-hit"
        data-val="${p.val}" data-label="${p.label}" data-pct="${((px(i)/W)*100).toFixed(2)}"
        onmouseenter="showTip(event,this)" onmouseleave="hideTip()"
      />
      <circle cx="${px(i).toFixed(1)}" cy="${py(p.val).toFixed(1)}" r="3.5"
        fill="#e8ff3c" pointer-events="none" class="dot-vis" id="dv${i}"/>
    `).join('');

    return `
    <div class="chart-section">
      <div class="chart-header">
        <div class="chart-title">CUMULATIVE TOTAL VIEWS</div>
        <div class="chart-total">${fmt(totalViews)} total</div>
      </div>
      <div class="chart-wrap" id="chartWrap">
        <div class="chart-tooltip" id="chartTip"></div>
        <svg class="line-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <defs>
            <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e8ff3c" stop-opacity="0.18"/>
              <stop offset="100%" stop-color="#e8ff3c" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <line x1="${P.l}" y1="${P.t}"       x2="${P.l+iW}" y2="${P.t}"       stroke="#222228" stroke-width="1"/>
          <line x1="${P.l}" y1="${P.t+iH/2}"  x2="${P.l+iW}" y2="${P.t+iH/2}" stroke="#222228" stroke-width="1"/>
          <line x1="${P.l}" y1="${P.t+iH}"    x2="${P.l+iW}" y2="${P.t+iH}"   stroke="#222228" stroke-width="1"/>
          <path d="${areaD}" fill="url(#ag)"/>
          <path d="${pathD}" fill="none" stroke="#e8ff3c" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
          ${dots}
          ${labels}
        </svg>
      </div>
    </div>`;
  }

  // ── CHANNELS ──
  function renderChannels(videos, channelMap) {
    const byChannel = {};
    videos.forEach(v => {
      if (!byChannel[v.channel]) byChannel[v.channel] = { views: 0, likes: 0, count: 0 };
      byChannel[v.channel].views += v.views;
      byChannel[v.channel].likes += (v.likes || 0);
      byChannel[v.channel].count++;
    });
    const sorted = Object.entries(byChannel).sort((a, b) => b[1].views - a[1].views);
    return `
    <div class="channels-section">
      <div class="section-header"><div class="section-title">BY CHANNEL</div></div>
      <div class="channel-grid">
        ${sorted.map(([name, s]) => `
          <div class="channel-card">
            <div class="channel-dot" style="background:${channelMap[name]}"></div>
            <div class="channel-info">
              <div class="channel-name">${name}</div>
              <div class="channel-meta">${s.count} video${s.count!==1?'s':''} · ${fmt(s.likes)} likes</div>
            </div>
            <div class="channel-views">${fmt(s.views)}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  // ── VIDEOS ──
  function renderVideos(videos, channelMap) {
    const sorted = [...videos].sort((a, b) => {
      if (currentSort === 'views')   return b.views - a.views;
      if (currentSort === 'likes')   return (b.likes||0) - (a.likes||0);
      if (currentSort === 'date')    return new Date(b.published) - new Date(a.published);
      if (currentSort === 'channel') return a.channel.localeCompare(b.channel);
      return 0;
    });

    const visible = showAll ? sorted : sorted.slice(0, PAGE_SIZE);
    const hasMore = sorted.length > PAGE_SIZE;

    const sortDefs = [
      { key: 'views',   label: '↓ Views' },
      { key: 'likes',   label: '↓ Likes' },
      { key: 'date',    label: '↓ Date' },
      { key: 'channel', label: 'A–Z Channel' },
    ];

    return `
    <div id="videoSection">
      <div class="section-header">
        <div class="section-title">VIDEOS</div>
        <div class="sort-bar">
          ${sortDefs.map(s => `<button class="sort-btn ${currentSort===s.key?'active':''}" onclick="setSort('${s.key}')">${s.label}</button>`).join('')}
        </div>
      </div>
      <div class="video-list">
        ${visible.map((v, i) => `
          <a class="video-card" href="https://youtube.com/watch?v=${v.id}" target="_blank" rel="noopener" style="animation-delay:${i*.03}s">
            <div class="video-rank ${i<3&&currentSort==='views'?'top':''}">${i+1}</div>
            <div class="video-thumb">
              <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"
                   onerror="this.parentNode.innerHTML='<div class=\\'thumb-placeholder\\'>▶</div>'" loading="lazy">
            </div>
            <div class="video-info">
              <h3>${v.title}</h3>
              <div class="video-meta">
                <span class="channel-pill">
                  <span class="channel-pip" style="background:${channelMap[v.channel]||'#888'}"></span>
                  ${v.channel}
                </span>
                <span>📅 ${fmtDate(v.published)}</span>
              </div>
            </div>
            <div class="video-views">
              <div class="views-number">${fmt(currentSort==='likes'?(v.likes||0):v.views)}</div>
              <div class="views-label">${currentSort==='likes'?'Likes':'Views'}</div>
            </div>
          </a>`).join('')}
      </div>
      ${hasMore ? `
        <div class="show-more-wrap">
          <button class="show-more-btn" onclick="toggleShowAll()">
            ${showAll ? '▲ Show less' : '▼ Show all ' + sorted.length + ' videos'}
          </button>
        </div>` : ''}
    </div>`;
  }

  // ── RENDER ──
  function render(data) {
    document.getElementById('updateTime').textContent = fmtDate(data.last_updated);
    const channelMap = buildChannelMap(data.videos);
    document.getElementById('app').innerHTML =
      renderKPIs(data, channelMap) +
      renderChart(data.videos, data.total_views) +
      renderChannels(data.videos, channelMap) +
      renderVideos(data.videos, channelMap);
  }

  // ── TOOLTIP ──
  function showTip(e, el) {
    const tip = document.getElementById('chartTip');
    const wrap = document.getElementById('chartWrap');
    if (!tip || !wrap) return;
    const val = parseInt(el.dataset.val);
    const label = el.dataset.label;
    tip.innerHTML = `<strong>${fmt(val)}</strong> views &nbsp;·&nbsp; ${label}`;
    // Position relative to chart wrap
    const wRect = wrap.getBoundingClientRect();
    const eRect = el.getBoundingClientRect();
    const x = eRect.left + eRect.width / 2 - wRect.left;
    const y = eRect.top - wRect.top;
    tip.style.left = x + 'px';
    tip.style.top = y + 'px';
    tip.classList.add('visible');
    // Highlight dot
    el.nextElementSibling && el.nextElementSibling.setAttribute('r', '5.5');
  }

  function hideTip() {
    const tip = document.getElementById('chartTip');
    if (tip) tip.classList.remove('visible');
    // Reset all dots
    document.querySelectorAll('.dot-vis').forEach(d => d.setAttribute('r', '3.5'));
  }

  // ── SORT / TOGGLE ──
  function setSort(key) {
    currentSort = key;
    showAll = false;
    const sec = document.getElementById('videoSection');
    if (sec && globalData) {
      sec.outerHTML = renderVideos(globalData.videos, buildChannelMap(globalData.videos));
    }
  }

  function toggleShowAll() {
    showAll = !showAll;
    const sec = document.getElementById('videoSection');
    if (sec && globalData) {
      sec.outerHTML = renderVideos(globalData.videos, buildChannelMap(globalData.videos));
    }
  }

  // ── LOAD ──
  fetch(DATA_URL)
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(data => { globalData = data; render(data); })
    .catch(err => {
      document.getElementById('app').innerHTML = `
        <div class="state-box">
          <span class="icon">⚠️</span>
          <p>Could not load data.<br>
          Make sure <code>data.json</code> exists in your GitHub repo<br>
          and that the <code>DATA_URL</code> at the top of the script is correct.</p>
        </div>`;
      console.error(err);
    });
</script>
</body>
</html>
