name: YouTube Stats aktualisieren

on:
  schedule:
    - cron: '0 6 * * *'   # Täglich um 06:00 UTC
  workflow_dispatch:        # Manuell auslösbar über GitHub UI

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: YouTube Stats abrufen
        run: python fetch_stats.py
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}

      - name: data.json committen und pushen
        run: |
          git config user.name "StatsBot"
          git config user.email "statsbot@noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "📊 Stats aktualisiert $(date +'%d.%m.%Y')"
          git push
